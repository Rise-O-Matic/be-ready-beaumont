<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 32" fill="none">
  <!-- B monogram — copper rounded square, B fills the square -->
  <g transform="translate(2, 2)">
    <rect x="0" y="0" width="28" height="28" rx="5" fill="#d4753e" transform="rotate(-2, 14, 14)"/>
    <text x="14" y="22" text-anchor="middle" font-family="'Outfit', sans-serif" font-weight="700" font-size="22" fill="white" transform="rotate(-2, 14, 14)">B</text>
  </g>
  <!-- Wordmark -->
  <text x="40" y="22" font-family="'Outfit', sans-serif" font-weight="600" font-size="18" fill="#141f33">Be Ready Beaumont</text>
</svg>
